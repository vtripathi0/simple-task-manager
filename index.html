<!DOCTYPE html>

<html>
<head>
<title>Task Manager</title>

<style>

body{
font-family:'Segoe UI', Arial, sans-serif;
background:#f2f4f7;
margin:0;
}

.container{
width:420px;
margin:70px auto;
background:#fff;
padding:28px;
border-radius:10px;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

h1{
text-align:center;
margin-bottom:5px;
}

.project-links{
text-align:center;
margin-bottom:10px;
}

.project-links a{
text-decoration:none;
background:#4f6bed;
color:white;
padding:6px 12px;
margin:0 5px;
border-radius:5px;
font-size:13px;
}

.project-links a:hover{
background:#3e57d4;
}

#taskCounter{
text-align:center;
font-size:14px;
color:#666;
margin-bottom:15px;
}

.search-box{
margin-bottom:10px;
}

.search-box input{
width:100%;
padding:9px;
border:1px solid #ddd;
border-radius:6px;
}

.input-area{
display:flex;
gap:10px;
margin-bottom:10px;
}

input{
flex:1;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
}

input:focus{
outline:none;
border-color:#4f6bed;
}

.add-btn{
background:#4f6bed;
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
}

.add-btn:hover{
background:#3e57d4;
}

.clear-btn{
width:100%;
margin-top:10px;
padding:8px;
border:none;
background:#f39c12;
color:white;
border-radius:6px;
cursor:pointer;
}

.clear-btn:hover{
background:#d68910;
}

ul{
padding:0;
margin-top:15px;
}

li{
list-style:none;
display:flex;
align-items:center;
gap:10px;
padding:10px;
border:1px solid #eee;
border-radius:6px;
margin-bottom:8px;
background:#fafafa;
}

li span{
flex:1;
}

.time{
font-size:11px;
color:#888;
}

.delete-btn{
background:#e74c3c;
border:none;
color:white;
padding:5px 10px;
border-radius:4px;
cursor:pointer;
font-size:12px;
}

.edit-btn{
background:#3498db;
border:none;
color:white;
padding:5px 10px;
border-radius:4px;
cursor:pointer;
font-size:12px;
}

.delete-btn:hover{
background:#c0392b;
}

.edit-btn:hover{
background:#2c80b4;
}

.empty{
text-align:center;
color:#888;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>Task Manager</h1>

<div class="project-links">
<a href="YOUR_VERCEL_LINK" target="_blank">Live App</a>
<a href="YOUR_GITHUB_LINK" target="_blank">GitHub Repo</a>
</div>

<p id="taskCounter">Total: 0 | Completed: 0 | Pending: 0</p>

<div class="search-box">
<input id="searchInput" placeholder="Search tasks...">
</div>

<div class="input-area">
<input id="taskInput" placeholder="Enter task">
<button class="add-btn" onclick="addTask()">Add</button>
</div>

<button class="clear-btn" onclick="clearCompleted()">Clear Completed Tasks</button>

<ul id="taskList"></ul>

<p id="emptyMessage" class="empty" style="display:none;">
No tasks yet. Add your first task.
</p>

</div>

<script>

async function loadTasks() {

  const res = await fetch('/api/tasks');
  const tasks = await res.json();

  const list = document.getElementById("taskList");
  const empty = document.getElementById("emptyMessage");

  list.innerHTML = "";

  const total = tasks.length;
  const completed = tasks.filter(t => t.completed).length;
  const pending = total - completed;

  document.getElementById("taskCounter").innerText =
  `Total: ${total} | Completed: ${completed} | Pending: ${pending}`;

  if(tasks.length === 0){
    empty.style.display = "block";
  }else{
    empty.style.display = "none";
  }

  tasks.forEach(task => {

    const li = document.createElement("li");

    li.innerHTML = `
      <input type="checkbox" ${task.completed ? "checked" : ""} onclick="toggleTask(${task.id})">

      <span style="${task.completed ? "text-decoration: line-through; color:gray;" : ""}">
        ${task.text}
        <div class="time">${task.createdAt}</div>
      </span>

      <button class="edit-btn" onclick="editTask(${task.id}, '${task.text}')">Edit</button>

      <button class="delete-btn" onclick="deleteTask(${task.id})">Delete</button>
    `;

    list.appendChild(li);

  });

}

async function addTask() {

  const input = document.getElementById("taskInput");
  const text = input.value.trim();

  if (!text) {
    alert("Please enter a task");
    return;
  }

  await fetch('/api/tasks', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({text})
  });

  input.value = "";
  loadTasks();

}

async function toggleTask(id) {

  await fetch('/api/tasks', {
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id})
  });

  loadTasks();

}

async function deleteTask(id) {

  await fetch('/api/tasks', {
    method:'DELETE',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id})
  });

  loadTasks();

}

async function editTask(id, oldText){

  const newText = prompt("Edit task:", oldText);

  if(!newText) return;

  await fetch('/api/tasks',{
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id:id, text:newText})
  });

  loadTasks();

}

async function clearCompleted(){

  await fetch('/api/tasks',{
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({})
  });

  loadTasks();

}

loadTasks();

document.getElementById("taskInput").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    addTask();
  }
});

document.getElementById("searchInput").addEventListener("input", function(){

  const value = this.value.toLowerCase();
  const tasks = document.querySelectorAll("#taskList li");

  tasks.forEach(task => {

    const text = task.innerText.toLowerCase();
    task.style.display = text.includes(value) ? "flex" : "none";

  });

});

</script>

</body>
</html>
