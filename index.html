<!DOCTYPE html>

<html>
<head>
<title>Task Manager</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:360px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:20px;
}

.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}

.add-btn{
padding:10px 15px;
border:none;
background:#4CAF50;
color:white;
border-radius:5px;
cursor:pointer;
}

.add-btn:hover{
background:#45a049;
}

ul{
margin-top:20px;
padding:0;
}

li{
list-style:none;
background:#f1f1f1;
margin-bottom:10px;
padding:10px;
border-radius:6px;
display:flex;
justify-content:space-between;
align-items:center;
}

.delete-btn{
background:#e74c3c;
color:white;
border:none;
padding:5px 10px;
border-radius:4px;
cursor:pointer;
}

.delete-btn:hover{
background:#c0392b;
}

</style>

</head>

<body>

<div class="container">

<h1>Task Manager</h1>

<div class="input-area">
<input id="taskInput" placeholder="Enter task">
<button class="add-btn" onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

</div>

<script>

async function loadTasks(){

const res = await fetch('/api/tasks');
const tasks = await res.json();

const list = document.getElementById("taskList");
list.innerHTML="";

tasks.forEach(task => {

const li=document.createElement("li");

li.innerHTML = `
<span>${task.text}</span>
<button class="delete-btn" onclick="deleteTask(${task.id})">Delete</button>
`;

list.appendChild(li);

});

}

async function addTask(){

const text=document.getElementById("taskInput").value.trim();

if(!text){
alert("Please enter a task");
return;
}

await fetch('/api/tasks',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({text})
});

document.getElementById("taskInput").value="";

loadTasks();

}

async function deleteTask(id){

await fetch('/api/tasks',{
method:'DELETE',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({id})
});

loadTasks();

}

loadTasks();

</script>

</body>
</html>
